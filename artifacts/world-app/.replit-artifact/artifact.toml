kind = "web"
previewPath = "/"
title = "World App"
version = "1.0.0"
id = "artifacts/world-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20674

[services.development]
run = "pnpm --filter @workspace/world-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/world-app", "run", "build" ]
publicDir = "artifacts/world-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20674"
BASE_PATH = "/"
